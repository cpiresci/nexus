<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>WUZO — Consultor Financeiro IA</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap');

/* ── RESET + VARS ──────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#030302;
  --card:#0d0c0a;
  --card2:#131108;
  --g:#e8c97a; --g2:#f5dfa0; --gd:#8a6a2c; --gdd:#3a2810;
  --bd:rgba(201,168,76,.14); --bd2:rgba(201,168,76,.3);
  --tx:#ede8dc; --dm:#c0b89e; --dm2:#5a4828;
  --wh:#faf6ee; --rd:#e05252; --gr:#4aaf78;
  --r:10px; --r2:6px;
}
html,body{background:var(--bg);color:var(--tx);font-family:'Outfit',sans-serif;min-height:100vh;}
body{
  background-image:
    radial-gradient(ellipse 80% 50% at 0% 10%,rgba(201,168,76,.055) 0%,transparent 55%),
    radial-gradient(ellipse 60% 60% at 100% 90%,rgba(201,168,76,.04) 0%,transparent 55%);
}
::-webkit-scrollbar{width:3px;height:3px;}
::-webkit-scrollbar-thumb{background:var(--gd);border-radius:2px;}

/* ── LAYOUT ──────────────────────────────────── */
.shell{max-width:680px;margin:0 auto;padding:20px 14px 80px;}

/* ── HEADER ──────────────────────────────────── */
.hdr{display:flex;align-items:center;justify-content:space-between;
  padding-bottom:14px;border-bottom:1px solid var(--bd);margin-bottom:20px;}
.logo{
  font-size:1.6rem;font-weight:900;letter-spacing:8px;
  background:linear-gradient(135deg,#7a5a1c,#f5ead0 35%,#c9a84c 55%,#f5ead0 75%,#7a5a1c);
  background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;
  animation:shimmer 4s linear infinite;
}
@keyframes shimmer{0%{background-position:200% center}100%{background-position:-200% center}}
.logo-sub{font-family:'JetBrains Mono',monospace;font-size:.42rem;letter-spacing:3px;color:var(--dm2);margin-top:2px;}
.hdr-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;}
.credit-badge{
  background:rgba(201,168,76,.08);border:1px solid var(--bd);
  border-radius:20px;padding:5px 12px;
  font-size:.68rem;font-weight:700;letter-spacing:1px;color:var(--g);
  font-family:'JetBrains Mono',monospace;
}
.status-dot{display:flex;align-items:center;gap:5px;font-size:.6rem;color:var(--gr);letter-spacing:1px;}
.status-dot::before{content:'';width:6px;height:6px;background:var(--gr);border-radius:50%;
  box-shadow:0 0 6px var(--gr);animation:blink 2s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;}}

/* ── CARD ────────────────────────────────────── */
.card{
  background:linear-gradient(135deg,rgba(201,168,76,.04),rgba(201,168,76,.01));
  border:1px solid var(--bd);border-radius:var(--r);
  padding:18px 16px;margin-bottom:14px;position:relative;overflow:hidden;
}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(201,168,76,.28),transparent);}

/* ── TEXTAREA ────────────────────────────────── */
.inp-lbl{font-family:'JetBrains Mono',monospace;font-size:.58rem;letter-spacing:2px;
  color:var(--dm2);text-transform:uppercase;margin-bottom:5px;}
textarea{
  width:100%;background:rgba(0,0,0,.35);border:1px solid var(--bd);
  border-radius:var(--r2);color:var(--tx);font-family:'Outfit',sans-serif;
  font-size:.92rem;padding:12px 14px;resize:vertical;min-height:100px;outline:none;
  line-height:1.7;transition:border-color .2s,box-shadow .2s;
}
textarea:focus{border-color:rgba(201,168,76,.4);box-shadow:0 0 0 3px rgba(201,168,76,.07);}
textarea::placeholder{color:var(--dm2);}

/* ── BUTTONS ─────────────────────────────────── */
.btn-row{display:flex;flex-direction:column;gap:10px;margin-top:14px;}
.btn{
  display:flex;align-items:center;justify-content:center;gap:8px;
  width:100%;padding:15px 20px;border-radius:50px;border:none;cursor:pointer;
  font-family:'Outfit',sans-serif;font-weight:800;font-size:.85rem;letter-spacing:1px;
  transition:all .2s;text-decoration:none;
}
.btn:disabled{opacity:.35;cursor:not-allowed;transform:none!important;}

/* Botão FREE — azul como JUSAII */
.btn-free{
  background:linear-gradient(135deg,#1a3a8a,#2255cc);
  color:#fff;
  box-shadow:0 4px 20px rgba(34,85,204,.3);
}
.btn-free:hover:not(:disabled){
  background:linear-gradient(135deg,#1e44a0,#2a60e0);
  transform:translateY(-1px);box-shadow:0 6px 24px rgba(34,85,204,.45);
}

/* Botão PREMIUM — dourado */
.btn-premium{
  background:linear-gradient(135deg,#b8860b,#e8c97a,#f5dfa0,#e8c97a,#8a6a2c);
  background-size:200% auto;color:#0d0900;
  animation:shimmer 3s linear infinite;
  box-shadow:0 4px 20px rgba(201,168,76,.3);
}
.btn-premium:hover:not(:disabled){
  transform:translateY(-1px);box-shadow:0 6px 28px rgba(201,168,76,.5);
}

/* Botão COMPRAR — verde */
.btn-buy{
  background:linear-gradient(135deg,#1a7a3a,#22a04d);
  color:#fff;
  box-shadow:0 4px 20px rgba(34,160,77,.25);
}
.btn-buy:hover:not(:disabled){
  background:linear-gradient(135deg,#1e8a42,#27b556);
  transform:translateY(-1px);box-shadow:0 6px 24px rgba(34,160,77,.4);
}

/* ── AGENT GRID ──────────────────────────────── */
.agent-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin:12px 0;}
@media(max-width:420px){.agent-grid{grid-template-columns:repeat(2,1fr);}}
.ac{
  background:rgba(0,0,0,.4);border:1px solid rgba(40,28,10,.7);
  border-radius:8px;padding:10px 5px;text-align:center;
  transition:border-color .3s,box-shadow .3s;
}
.ac.thinking{border-color:var(--g);animation:pg 1.3s ease-in-out infinite;}
.ac.done{border-color:var(--gr);}
.ac.error{border-color:var(--rd);}
@keyframes pg{0%,100%{box-shadow:0 0 0 0 rgba(201,168,76,.4);}50%{box-shadow:0 0 10px rgba(201,168,76,.2);}}
.ac-em{font-size:1.2rem;line-height:1;}
.ac-nm{font-size:.5rem;color:#c0b89e;letter-spacing:.5px;margin-top:4px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding:0 2px;}
.ac-st{font-size:.55rem;font-weight:700;margin-top:4px;color:rgba(40,28,10,.9);}
.ac.thinking .ac-st{color:var(--g);}
.ac.done .ac-st{color:var(--gr);}
.ac.error .ac-st{color:var(--rd);}

/* ── PROGRESS ────────────────────────────────── */
.prog{background:rgba(201,168,76,.07);border-radius:3px;height:4px;overflow:hidden;margin:8px 0;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--gdd),var(--g),var(--g2));
  border-radius:3px;transition:width .4s;width:0%;}

/* ── LOG ─────────────────────────────────────── */
.log{background:rgba(0,0,0,.5);border:1px solid var(--bd);border-radius:var(--r2);
  padding:8px 12px;max-height:90px;overflow-y:auto;
  font-family:'JetBrains Mono',monospace;font-size:.6rem;color:var(--dm);margin:8px 0;}
.ll{padding:1px 0;border-bottom:1px solid rgba(201,168,76,.04);}
.ll:last-child{border:none;color:var(--g);}
.ll.ok{color:var(--gr);}
.ll.er{color:var(--rd);}

/* ── FREE RESULT ─────────────────────────────── */
#sec-free{display:none;}
.verdict-card{
  background:linear-gradient(135deg,#0a1225,#0d1830);
  border:1px solid rgba(100,150,255,.2);border-radius:var(--r);
  border-left:3px solid #4488ff;padding:18px 16px;margin-bottom:14px;
}
.verdict-title{color:#6aabff;font-size:1rem;font-weight:800;
  display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.verdict-body{font-size:.88rem;line-height:1.9;color:#d0ddf5;}
.verdict-body strong,.verdict-body b{color:#a0c4ff;}
.vline{height:1px;background:rgba(100,150,255,.15);margin:10px 0;}

/* ── PREVIEW CARD (parcial com blur) ─────────── */
.preview-wrap{position:relative;overflow:hidden;border-radius:var(--r);}
.preview-content{
  background:linear-gradient(135deg,#0a1225,#0d1830);
  border:1px solid rgba(100,150,255,.2);border-radius:var(--r);
  border-left:3px solid #4488ff;padding:18px 16px;
  font-size:.88rem;line-height:1.9;color:#d0ddf5;
  max-height:240px;overflow:hidden;
}
.preview-content h3{color:#6aabff;margin-bottom:8px;}
.preview-blur{
  position:absolute;bottom:0;left:0;right:0;height:120px;
  background:linear-gradient(to bottom,transparent,rgba(3,3,2,.97));
  display:flex;align-items:flex-end;padding-bottom:0;
}
/* ── LOCK CARD ───────────────────────────────── */
.lock-card{
  background:linear-gradient(135deg,rgba(201,168,76,.06),rgba(201,168,76,.02));
  border:1px solid var(--bd2);border-radius:var(--r);
  padding:22px 18px;text-align:center;margin-top:-4px;
}
.lock-icon{font-size:1.8rem;margin-bottom:8px;}
.lock-title{color:var(--g);font-size:1rem;font-weight:800;margin-bottom:4px;}
.lock-sub{color:var(--dm);font-size:.8rem;margin-bottom:16px;}

/* ── FULL REPORT ─────────────────────────────── */
#sec-full{display:none;}
.report-card{
  background:rgba(201,168,76,.015);border:1px solid var(--bd);
  border-radius:var(--r);padding:22px 18px;margin-bottom:14px;
}
.report-card h1,.report-card h2{
  font-family:'Outfit',sans-serif;color:var(--g);
  border-bottom:1px solid var(--bd);padding-bottom:5px;margin:16px 0 8px;font-size:1rem;
}
.report-card h3{font-size:.9rem;color:var(--wh);margin:12px 0 5px;}
.report-card p{margin-bottom:10px;font-size:.9rem;line-height:1.9;}
.report-card strong,.report-card b{color:var(--g2);}
.report-card ul,.report-card ol{padding-left:18px;margin-bottom:10px;}
.report-card li{margin-bottom:3px;font-size:.88rem;line-height:1.8;}
.report-card table{width:100%;border-collapse:collapse;margin:12px 0;font-size:.8rem;}
.report-card th{background:rgba(201,168,76,.07);color:var(--g);padding:6px 8px;
  text-align:left;border:1px solid var(--bd);font-size:.6rem;letter-spacing:1px;text-transform:uppercase;}
.report-card td{padding:5px 8px;border:1px solid rgba(201,168,76,.07);}
.report-card tr:nth-child(even) td{background:rgba(201,168,76,.01);}
.report-card blockquote{border-left:2px solid var(--g);padding-left:12px;
  color:var(--dm);margin:10px 0;font-style:italic;}
.report-card code{background:rgba(201,168,76,.08);padding:2px 5px;
  border-radius:3px;font-family:'JetBrains Mono',monospace;font-size:.82em;}

/* markdown raw fix */
.report-card p:has(> strong:first-child){margin-bottom:4px;}

/* ── AGENT ANALYSIS BLOCKS ───────────────────── */
.agent-block{
  background:linear-gradient(135deg,#0a1225,#0d1830);
  border:1px solid rgba(100,150,255,.15);border-radius:var(--r);
  border-left:3px solid #4488ff;padding:16px;margin-bottom:10px;
}
.agent-block-title{color:#6aabff;font-size:.85rem;font-weight:700;
  display:flex;align-items:center;gap:6px;margin-bottom:10px;}
.agent-block-body{font-size:.84rem;line-height:1.85;color:#d0ddf5;}
.agent-block-body strong,.agent-block-body b{color:#a0c4ff;}

/* ── DOWNLOAD ROW ────────────────────────────── */
.dl-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;}
.dl-btn{flex:1;min-width:120px;text-align:center;padding:10px;border-radius:50px;
  font-weight:700;font-size:.65rem;letter-spacing:1px;text-transform:uppercase;
  text-decoration:none;border:1px solid var(--bd);color:var(--g);
  background:rgba(201,168,76,.05);transition:all .2s;}
.dl-btn:hover{border-color:var(--g);background:rgba(201,168,76,.1);}

/* ── PILL ────────────────────────────────────── */
.pill{display:inline-block;padding:3px 10px;border-radius:20px;
  font-size:.55rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;}
.pill-run{background:rgba(201,168,76,.1);color:var(--g);}
.pill-done{background:rgba(74,175,120,.1);color:var(--gr);}

/* ── ALERT ───────────────────────────────────── */
.alert{padding:10px 14px;border-radius:var(--r2);border-left:3px solid;
  margin:8px 0;font-size:.82rem;display:none;}
.alert-info{border-color:var(--g);background:rgba(201,168,76,.05);color:var(--g2);}
.alert-err {border-color:var(--rd);background:rgba(224,82,82,.05);color:#f5a0a0;}
.alert-ok  {border-color:var(--gr);background:rgba(74,175,120,.05);color:#a0f5c0;}

/* ── LANGUAGE SELECTOR ───────────────────────── */
.lang-sel{display:flex;align-items:center;gap:5px;}
.lang-opt{
  padding:3px 9px;border-radius:20px;border:1px solid var(--bd);
  background:transparent;color:var(--dm2);font-family:'JetBrains Mono',monospace;
  font-size:.52rem;letter-spacing:1px;cursor:pointer;transition:all .15s;
}
.lang-opt.active{border-color:var(--g);color:var(--g);background:rgba(201,168,76,.08);}
.lang-opt:hover:not(.active){color:var(--dm);border-color:rgba(201,168,76,.2);}

/* ── SPINNER ─────────────────────────────────── */
.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(201,168,76,.3);
  border-top-color:var(--g);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="shell">

<!-- HEADER -->
<div class="hdr">
  <div>
    <div class="logo">WUZO</div>
    <div class="logo-sub">FINANCIAL INTELLIGENCE · MULTI-AGENT IA</div>
  </div>
  <div class="hdr-right">
    <div class="credit-badge">⭐ PREMIUM: <span id="cred-num">0</span></div>
    <div class="lang-sel">
      <button class="lang-opt active" id="lo-pt" onclick="setLang('pt')">PT</button>
      <button class="lang-opt" id="lo-en" onclick="setLang('en')">EN</button>
      <button class="lang-opt" id="lo-es" onclick="setLang('es')">ES</button>
    </div>
    <div class="status-dot">MOTOR ONLINE</div>
  </div>
</div>

<!-- INPUT CARD -->
<div class="card" id="card-input">
  <div class="inp-lbl">Descreva sua situação financeira</div>
  <textarea id="txt-input"
    placeholder="Ex: Tenho R$ 50.000 para investir, dívida no cartão de R$ 8.000 com juros de 12% ao mês, renda de R$ 6.000/mês. Quero construir patrimônio nos próximos 5 anos com perfil moderado."></textarea>

  <div class="btn-row">
    <button class="btn btn-free" id="btn-free" onclick="handleFree()">
      ⚡ ANÁLISE GRATUITA
    </button>
    <button class="btn btn-premium" id="btn-premium" onclick="handlePremium()">
      ⭐ RELATÓRIO PREMIUM (16 ESP.)
    </button>
    <button class="btn btn-buy" id="btn-buy" onclick="handleBuy()">
      🛒 COMPRAR (R$ 19,90)
    </button>
  </div>
  <div class="alert alert-err" id="inp-alert"></div>
</div>

<!-- PIPELINE SECTION -->
<div class="card" id="sec-pipeline" style="display:none;">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
    <span style="font-family:'JetBrains Mono',monospace;font-size:.6rem;letter-spacing:2px;color:var(--dm2);">AGENTES EM EXECUÇÃO</span>
    <span class="pill pill-run" id="pip-pill">RUNNING</span>
  </div>
  <div class="agent-grid" id="agent-grid"></div>
  <div class="prog"><div class="prog-fill" id="prog-fill"></div></div>
  <div class="log" id="log-feed"><div class="ll">⬡ Iniciando...</div></div>
</div>

<!-- FREE RESULT SECTION -->
<div id="sec-free">

  <!-- Veredito -->
  <div class="verdict-card" id="verdict-box">
    <div class="verdict-title">⚖️ Veredito do Consultor IA</div>
    <div class="vline"></div>
    <div class="verdict-body" id="verdict-body"></div>
  </div>

  <!-- Preview de 1 especialista com blur -->
  <div class="preview-wrap">
    <div class="preview-content" id="preview-body"></div>
    <div class="preview-blur"></div>
  </div>

  <!-- Lock card -->
  <div class="lock-card">
    <div class="lock-icon">🔒</div>
    <div class="lock-title">Desbloqueie o relatório completo</div>
    <div class="lock-sub">Veja a análise dos 16 especialistas + downloads em MD, TXT e HTML</div>
    <div class="btn-row" style="margin-top:0;">
      <button class="btn btn-premium" onclick="handlePremium()">⭐ Usar Crédito Premium</button>
      <button class="btn btn-buy" onclick="handleBuy()">🛒 Comprar — R$ 19,90</button>
    </div>
  </div>
</div>

<!-- FULL REPORT SECTION -->
<div id="sec-full">
  <div class="report-card" id="full-report-box"></div>

  <!-- Análises por agente -->
  <div id="agent-blocks-box"></div>

  <!-- Downloads -->
  <div class="dl-row" id="dl-row">
    <a class="dl-btn" id="dl-md"   href="#" download="relatorio_wuzo.md">⬇ .MD</a>
    <a class="dl-btn" id="dl-txt"  href="#" download="relatorio_wuzo.txt">⬇ .TXT</a>
    <a class="dl-btn" id="dl-html" href="#" download="relatorio_wuzo.html">⬇ .HTML</a>
  </div>
</div>

</div><!-- /shell -->

<!-- Marked.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>

<script>
// ════════════════════════════════════════════════════════
// CONFIG — lida com app.wuzo.com.br rodando no Render
// As env vars já estão no Render: SAMBANOVA_API_KEY,
// GEMINI_API_KEY, CEREBRAS_API_KEY, OPENAI_API_KEY
// O Streamlit (app.py) serve como backend via query params
// ════════════════════════════════════════════════════════

// URL base do backend Render (app.wuzo.com.br / Streamlit)
// O HTML chama o endpoint /agent/run do FastAPI (api.py)
// OU chama direto o LLM se tiver chave local
const BACKEND_URL  = "https://wuzo-teste.onrender.com"; // ajuste se mudar
const STRIPE_URL   = ""; // URL do Stripe checkout — preenchida via /credits/purchase

// Chave local (fallback se não tiver backend)
// Deixar vazio para usar sempre o backend
const LOCAL_LLM_KEY      = localStorage.getItem("wuzo_llm_key") || "";
const LOCAL_LLM_PROVIDER = localStorage.getItem("wuzo_llm_prov") || "sambanova";

// Token de sessão (pego da URL ou localStorage)
function getToken(){
  const p = new URLSearchParams(location.search);
  const t = p.get("token") || p.get("t") || localStorage.getItem("wuzo_token") || "";
  if (t) localStorage.setItem("wuzo_token", t);
  return t;
}

// ════════════════════════════════════════════════════════
// LANGUAGE — detecta pelo navegador, persiste em localStorage
// ════════════════════════════════════════════════════════
const _VALID_LANGS = ["pt","en","es"];
const _BROWSER_LANG = (navigator.language||"pt").toLowerCase().slice(0,2);
let currentLang = localStorage.getItem("wuzo_lang")
  || (_VALID_LANGS.includes(_BROWSER_LANG) ? _BROWSER_LANG : "pt");

// Instrução de idioma injetada nos system prompts
const _LANG_INSTR = {
  pt: "Responda em português.",
  en: "Respond entirely in English. Do not use Portuguese or Spanish.",
  es: "Responde completamente en español. No uses portugués ni inglés.",
};
function langInstr(){ return _LANG_INSTR[currentLang] || _LANG_INSTR.pt; }

// Locale para datas
const _LOCALE = {pt:"pt-BR", en:"en-US", es:"es-ES"};
function locale(){ return _LOCALE[currentLang] || "pt-BR"; }

function setLang(lang){
  if(!_VALID_LANGS.includes(lang)) return;
  currentLang = lang;
  localStorage.setItem("wuzo_lang", lang);
  // Atualiza botões
  _VALID_LANGS.forEach(l=>{
    const el = document.getElementById("lo-"+l);
    if(el) el.classList.toggle("active", l===lang);
  });
}

document.addEventListener("DOMContentLoaded",()=>{
  // Aplica idioma detectado nos botões ao carregar
  setLang(currentLang);
});

// ════════════════════════════════════════════════════════
// 16 AGENTES
// ════════════════════════════════════════════════════════
const AGENTS = [
  {id:"noticias_realtime",       em:"📡", nm:"Notícias"},
  {id:"macroeconomia",           em:"🌐", nm:"Macro"},
  {id:"sentimento_mercado",      em:"🧠", nm:"Sentimento"},
  {id:"criptomoedas",            em:"₿",  nm:"Cripto"},
  {id:"acoes_equity",            em:"📈", nm:"Ações"},
  {id:"derivativos",             em:"🔄", nm:"Derivativos"},
  {id:"rwa",                     em:"🏭", nm:"RWA"},
  {id:"renda_fixa",              em:"💵", nm:"Renda Fixa"},
  {id:"imoveis_fiis",            em:"🏢", nm:"FIIs"},
  {id:"quitacao_dividas",        em:"💳", nm:"Dívidas"},
  {id:"credito_financiamento",   em:"🏦", nm:"Crédito"},
  {id:"planejamento_tributario", em:"📋", nm:"Tributário"},
  {id:"compliance_risco",        em:"🛡️", nm:"Compliance"},
  {id:"auditor_dados",           em:"🔍", nm:"Auditor"},
  {id:"consultor_senior",        em:"👔", nm:"Consultor"},
  {id:"redator_relatorios",      em:"✍️", nm:"Redator"},
];

// ════════════════════════════════════════════════════════
// LLM CALL — usa backend ou chave local
// ════════════════════════════════════════════════════════
async function llm(system, user, tokens=600){
  // 1. Tenta backend FastAPI /agent/run
  const tok = getToken();
  if(tok){
    try{
      const r = await fetch(BACKEND_URL+"/agent/run",{
        method:"POST",
        headers:{"Content-Type":"application/json","Authorization":"Bearer "+tok},
        body: JSON.stringify({system, user, max_tokens: tokens, language: currentLang})
      });
      if(r.ok){ const d=await r.json(); return d.result||d.content||""; }
    }catch{}
  }

  // 2. Tenta chave local direta
  if(LOCAL_LLM_KEY){
    return await llmDirect(system, user, tokens);
  }

  // 3. Usa APIs do Render via endpoint público do Streamlit
  // O app.py expõe /agent via query param ?agent_run=1
  try{
    const r = await fetch(BACKEND_URL+`/?agent_run=1`,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({system, user, max_tokens: tokens})
    });
    if(r.ok){ const d=await r.json(); return d.result||""; }
  }catch{}

  return "⚠ Sem conexão com o backend. Configure a API key local.";
}

async function llmDirect(system, user, tokens){
  const PROVIDERS = {
    sambanova:{url:"https://api.sambanova.ai/v1/chat/completions",  model:"Meta-Llama-3.3-70B-Instruct"},
    openai:   {url:"https://api.openai.com/v1/chat/completions",    model:"gpt-4o-mini"},
    groq:     {url:"https://api.groq.com/openai/v1/chat/completions",model:"llama-3.3-70b-versatile"},
    gemini:   {url:"https://generativelanguage.googleapis.com/v1beta/openai/chat/completions",model:"gemini-2.0-flash"},
    cerebras: {url:"https://api.cerebras.ai/v1/chat/completions",   model:"llama3.1-8b"},
  };
  const ep = PROVIDERS[LOCAL_LLM_PROVIDER] || PROVIDERS.groq;
  try{
    const r = await fetch(ep.url,{
      method:"POST",
      headers:{"Content-Type":"application/json","Authorization":"Bearer "+LOCAL_LLM_KEY},
      body:JSON.stringify({model:ep.model,max_tokens:tokens,temperature:.3,
        messages:[{role:"system",content:system},{role:"user",content:user}]
      })
    });
    if(!r.ok) return "❌ HTTP "+r.status;
    const d = await r.json();
    return d.choices?.[0]?.message?.content?.trim()||"";
  }catch(e){ return "❌ "+e.message; }
}

function buildGrid(){
  const g = document.getElementById("agent-grid");
  g.innerHTML="";
  AGENTS.forEach(a=>{
    const d=document.createElement("div");
    d.className="ac"; d.id="ac-"+a.id;
    d.innerHTML=`<div class="ac-em">${a.em}</div><div class="ac-nm">${a.nm}</div><div class="ac-st">○</div>`;
    g.appendChild(d);
  });
}

function setAc(id,st){
  const c=document.getElementById("ac-"+id); if(!c)return;
  const ic={idle:"○",thinking:"◉",done:"✓",error:"✗"};
  c.className="ac "+st;
  c.querySelector(".ac-st").textContent=ic[st]||"○";
  const done=Object.values(agentOutputs).filter(Boolean).length;
  document.getElementById("prog-fill").style.width=Math.round(done/AGENTS.length*100)+"%";
}

function log(msg,cls=""){
  const f=document.getElementById("log-feed");
  const d=document.createElement("div");
  d.className="ll "+cls;
  d.textContent="["+new Date().toLocaleTimeString(locale())+"] "+msg;
  f.appendChild(d); f.scrollTop=f.scrollHeight;
}

function renderFreeResult(veredito, preview){

    .replace(/^(VEREDITO|SAÚDE FINANCEIRA|URGÊNCIA|ÁREAS CRÍTICAS|FUNDAMENTO|SÍNTESE|RISCOS|PRÓXIMOS PASSOS):/gm,
      m=>`<div style="color:var(--g);font-size:.6rem;letter-spacing:2px;text-transform:uppercase;margin-top:10px;margin-bottom:2px;">${m}</div>`)

}

function showAlert(id,cls,msg){
  const el=document.getElementById(id);
  el.className="alert "+cls; el.textContent=msg; el.style.display="block";
}
function hideAlert(id){ document.getElementById(id).style.display="none"; }

window.setLocalKey = (key, provider="groq") => {
  localStorage.setItem("wuzo_llm_key", key);
  localStorage.setItem("wuzo_llm_prov", provider);
  location.reload();
};
window.setToken = (tok) => {
  localStorage.setItem("wuzo_token", tok);
  location.reload();
};
