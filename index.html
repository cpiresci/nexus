<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
    <title>WUZO — Consultor Financeiro IA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { background: #030302; color: #f8fafc; font-family: 'Outfit', sans-serif; min-height: 100vh; margin: 0; }
        .glass { background: rgba(15,23,42,0.85); backdrop-filter: blur(20px); border: 1px solid rgba(232,201,122,0.08); }
        .loader { border: 3px solid rgba(232,201,122,0.1); border-top: 3px solid #e8c97a; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0%{transform:rotate(0deg)} 100%{transform:rotate(360deg)} }
        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
        .veredito-box { background: linear-gradient(135deg,rgba(232,201,122,0.2) 0%,rgba(232,201,122,0.1) 100%); border-left: 4px solid #e8c97a; }
        .btn-premium { background: linear-gradient(135deg,#f59e0b,#d97706); }
        .btn-buy { background: linear-gradient(135deg,#10b981,#059669); }
        details summary { cursor: pointer; }
        input::placeholder { color: rgba(148,163,184,0.5); }
    </style>
</head>
<body class="flex flex-col items-center p-4 md:p-12">

    <!-- HEADER -->
    <header class="w-full max-w-5xl flex justify-between items-center mb-10 border-b border-white/5 pb-8">
        <div>
            <h1 class="text-4xl font-black italic tracking-tighter text-amber-500 uppercase">WUZO</h1>
            <p class="text-[9px] opacity-40 uppercase tracking-[0.4em] font-bold italic">Financial Multi‑Agent Intelligence</p>
        </div>
        <div class="flex gap-3 items-center flex-wrap justify-end">
            <!-- Créditos premium -->
            <div class="bg-amber-600/20 px-4 py-2 rounded-2xl border border-amber-500/30 flex items-center gap-2">
                <span class="text-[10px] font-bold opacity-60 uppercase">Premium:</span>
                <span id="p-count" class="font-black text-white italic text-lg">--</span>
            </div>
            <!-- Email do usuário -->
            <span id="user-email" class="text-xs text-slate-400 hidden"></span>
            <!-- Botões auth -->
            <div id="auth-buttons" class="flex gap-2">
                <button onclick="showLogin()" class="text-sm bg-white/10 px-4 py-2 rounded-xl hover:bg-white/20 transition">Login</button>
                <button onclick="showRegister()" class="text-sm bg-amber-600 px-4 py-2 rounded-xl hover:bg-amber-500 transition">Registrar</button>
            </div>
            <div id="logout-button" class="hidden">
                <button onclick="logout()" class="text-sm bg-red-600/20 px-4 py-2 rounded-xl hover:bg-red-600/40 transition">Sair</button>
            </div>
        </div>
    </header>

    <!-- MAIN -->
    <main class="w-full max-w-4xl space-y-8">

        <!-- INPUT -->
        <section class="glass rounded-[2.5rem] p-2 shadow-2xl">
            <textarea id="txt-input"
                class="w-full h-64 p-8 bg-transparent border-none outline-none text-base leading-relaxed placeholder:opacity-30 resize-none text-white"
                placeholder="Descreva sua situação financeira com o máximo de detalhes...&#10;&#10;Ex: Tenho R$ 50.000 para investir, dívida no cartão de R$ 8.000 com juros de 12% ao mês, renda de R$ 6.000/mês. Quero construir patrimônio nos próximos 5 anos com perfil moderado."></textarea>
            <div class="p-5 flex flex-col md:flex-row justify-between items-center border-t border-white/5 gap-4">
                <div class="flex items-center gap-2">
                    <div id="status-dot" class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                    <span id="st-msg" class="text-[10px] uppercase font-bold text-slate-500 tracking-widest">Motor Online</span>
                </div>
                <div class="flex gap-3 flex-wrap justify-center">
                    <button onclick="analisar('free')" id="btn-free"
                        class="bg-amber-600 hover:bg-amber-500 text-white px-6 py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest transition disabled:opacity-40">
                        ⚡ Análise Gratuita
                    </button>
                    <button onclick="analisar('premium')" id="btn-premium"
                        class="btn-premium hover:opacity-90 text-white px-6 py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest transition disabled:opacity-40">
                        ⭐ Relatório Premium (16 Esp.)
                    </button>
                    <button onclick="comprar()" id="btn-buy"
                        class="btn-buy hover:opacity-90 text-white px-6 py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest transition">
                        🛒 Comprar (R$ 19,90)
                    </button>
                </div>
            </div>
        </section>

        <!-- LOADING -->
        <div id="loading-box" class="hidden flex flex-col items-center py-10 space-y-4">
            <div class="loader"></div>
            <p id="loading-msg" class="text-[10px] uppercase tracking-widest text-amber-400 animate-pulse font-bold text-center">
                Consultando especialistas financeiros...
            </p>
        </div>

        <!-- OUTPUT -->
        <div id="output-area" class="space-y-5 pb-40"></div>

    </main>

    <!-- MODAL LOGIN -->
    <div id="login-modal" class="fixed inset-0 bg-black/80 flex items-center justify-center hidden z-50 p-4">
        <div class="glass p-8 rounded-2xl w-full max-w-sm">
            <h2 class="text-2xl font-bold mb-6">Entrar</h2>
            <input type="email" id="login-email" placeholder="Email"
                class="w-full p-3 rounded-xl bg-white/10 mb-3 text-white outline-none border border-white/10 focus:border-amber-500">
            <input type="password" id="login-password" placeholder="Senha"
                class="w-full p-3 rounded-xl bg-white/10 mb-5 text-white outline-none border border-white/10 focus:border-amber-500">
            <button onclick="login()" class="w-full bg-amber-600 hover:bg-amber-500 py-3 rounded-xl font-bold transition">Entrar</button>
            <button onclick="closeModals()" class="w-full mt-3 text-sm opacity-50 hover:opacity-100 transition">Cancelar</button>
            <p id="login-error" class="text-red-400 text-sm mt-3 hidden"></p>
        </div>
    </div>

    <!-- MODAL REGISTER -->
    <div id="register-modal" class="fixed inset-0 bg-black/80 flex items-center justify-center hidden z-50 p-4">
        <div class="glass p-8 rounded-2xl w-full max-w-sm">
            <h2 class="text-2xl font-bold mb-6">Criar Conta</h2>
            <input type="email" id="reg-email" placeholder="Email"
                class="w-full p-3 rounded-xl bg-white/10 mb-3 text-white outline-none border border-white/10 focus:border-amber-500">
            <input type="text" id="reg-name" placeholder="Nome (opcional)"
                class="w-full p-3 rounded-xl bg-white/10 mb-3 text-white outline-none border border-white/10 focus:border-amber-500">
            <input type="password" id="reg-password" placeholder="Senha (mínimo 4 caracteres)"
                class="w-full p-3 rounded-xl bg-white/10 mb-5 text-white outline-none border border-white/10 focus:border-amber-500">
            <button onclick="register()" class="w-full bg-amber-600 hover:bg-amber-500 py-3 rounded-xl font-bold transition">Criar conta</button>
            <button onclick="closeModals()" class="w-full mt-3 text-sm opacity-50 hover:opacity-100 transition">Cancelar</button>
            <p id="reg-error" class="text-red-400 text-sm mt-3 hidden"></p>
        </div>
    </div>

    <script>
        // API URL (substitua pela URL do seu backend Flask no Render)
        const API = "https://wuzo-api.onrender.com"; // ou a URL local para testes
        let token = localStorage.getItem("token");
        let userId = null;

        // ── UI ──────────────────────────────────────────────────────────
        function updateUI() {
            if (token) {
                document.getElementById("auth-buttons").classList.add("hidden");
                document.getElementById("logout-button").classList.remove("hidden");
                fetch(API + "/api/auth/me", { headers: { Authorization: `Bearer ${token}` } })
                    .then(r => r.json())
                    .then(data => {
                        document.getElementById("p-count").innerText = data.premium_credits ?? 0;
                        document.getElementById("user-email").innerText = data.email || "";
                        document.getElementById("user-email").classList.remove("hidden");
                        userId = data.id;
                    })
                    .catch(() => {
                        localStorage.removeItem("token");
                        token = null;
                        updateUI();
                    });
            } else {
                document.getElementById("auth-buttons").classList.remove("hidden");
                document.getElementById("logout-button").classList.add("hidden");
                document.getElementById("user-email").classList.add("hidden");
                document.getElementById("p-count").innerText = "--";
            }
        }

        function setStatus(msg, color = "text-slate-500") {
            const el = document.getElementById("st-msg");
            el.innerText = msg;
            el.className = `text-[10px] uppercase font-bold tracking-widest ${color}`;
        }

        function setLoading(on, msg = "Consultando especialistas financeiros...") {
            document.getElementById("loading-box").classList.toggle("hidden", !on);
            document.getElementById("loading-msg").innerText = msg;
            document.getElementById("btn-free").disabled = on;
            document.getElementById("btn-premium").disabled = on;
            if (on) setStatus("A processar...", "text-amber-400");
            else setStatus("Motor Online", "text-slate-500");
        }

        // ── AUTH ────────────────────────────────────────────────────────
        async function login() {
            const email = document.getElementById("login-email").value.trim();
            const password = document.getElementById("login-password").value;
            const errEl = document.getElementById("login-error");
            errEl.classList.add("hidden");
            if (!email || !password) { showErr(errEl, "Preencha email e senha."); return; }
            try {
                const res = await fetch(API + "/api/auth/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (res.ok) {
                    token = data.token;
                    localStorage.setItem("token", token);
                    closeModals();
                    updateUI();
                } else {
                    showErr(errEl, data.error || "Erro no login");
                }
            } catch { showErr(errEl, "Erro de conexão com o servidor."); }
        }

        async function register() {
            const email = document.getElementById("reg-email").value.trim();
            const password = document.getElementById("reg-password").value;
            const name = document.getElementById("reg-name").value.trim();
            const errEl = document.getElementById("reg-error");
            errEl.classList.add("hidden");
            if (!email || !password) { showErr(errEl, "Preencha email e senha."); return; }
            if (password.length < 4) { showErr(errEl, "Senha deve ter pelo menos 4 caracteres."); return; }
            try {
                const res = await fetch(API + "/api/auth/register", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, password, name })
                });
                const data = await res.json();
                if (res.ok) {
                    closeModals();
                    showLogin();
                    document.getElementById("login-email").value = email;
                    alert("Conta criada! Faça login.");
                } else {
                    showErr(errEl, data.error || "Erro ao criar conta");
                }
            } catch { showErr(errEl, "Erro de conexão com o servidor."); }
        }

        function logout() {
            localStorage.removeItem("token");
            token = null;
            userId = null;
            document.getElementById("output-area").innerHTML = "";
            updateUI();
        }

        // ── ANÁLISE ─────────────────────────────────────────────────────
        async function analisar(tipo) {
            const prompt = document.getElementById("txt-input").value.trim();
            if (!prompt || prompt.length < 20) {
                alert("Descreva a situação financeira com pelo menos 20 caracteres.");
                return;
            }
            if (tipo === "premium" && !token) {
                alert("Você precisa estar logado para usar o relatório premium.");
                showLogin();
                return;
            }

            const output = document.getElementById("output-area");
            output.innerHTML = "";

            const loadingMsg = tipo === "free"
                ? "Consultando especialista financeiro..."
                : "Iniciando análise premium...";
            setLoading(true, loadingMsg);

            try {
                if (tipo === "free") {
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 60000);
                    const res = await fetch(API + "/api/analyze", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ prompt }),
                        signal: controller.signal
                    });
                    clearTimeout(timeoutId);
                    if (!res.ok) {
                        const err = await res.json().catch(() => ({}));
                        throw new Error(err.error || `Erro ${res.status}`);
                    }
                    const data = await res.json();
                    renderFree(data, output);
                } else {
                    // Premium
                    const resJob = await fetch(API + "/api/analyze/premium", {
                        method: "POST",
                        headers: { "Content-Type": "application/json", "Authorization": `Bearer ${token}` },
                        body: JSON.stringify({ prompt })
                    });
                    if (!resJob.ok) {
                        if (resJob.status === 402) {
                            output.innerHTML = `
                                <div class="glass p-8 rounded-2xl text-center fade-in">
                                    <p class="text-yellow-400 text-lg font-bold mb-2">⚠ Sem créditos premium</p>
                                    <p class="text-slate-400 mb-4">Adquira um relatório para continuar.</p>
                                    <button onclick="comprar()" class="btn-buy px-8 py-3 rounded-xl font-bold text-white">
                                        🛒 Comprar Relatório — R$ 19,90
                                    </button>
                                </div>`;
                            return;
                        }
                        const err = await resJob.json().catch(() => ({}));
                        throw new Error(err.error || `Erro ${resJob.status}`);
                    }
                    const jobData = await resJob.json();
                    const jobId = jobData.job_id;
                    const data = await pollJob(jobId);
                    if (data) {
                        renderPremium(data, output);
                        updateUI();
                    }
                }
            } catch (err) {
                if (err.name === "AbortError") {
                    output.innerHTML = `<div class="glass p-8 rounded-2xl text-center fade-in">
                        <p class="text-red-400 font-bold text-lg">⏱ Tempo esgotado</p>
                        <p class="text-slate-400 mt-2">A análise demorou mais que o esperado. Tente novamente.</p>
                    </div>`;
                } else {
                    output.innerHTML = `<div class="glass p-8 rounded-2xl text-center fade-in">
                        <p class="text-red-400 font-bold text-lg">❌ Erro</p>
                        <p class="text-slate-400 mt-2">${err.message}</p>
                    </div>`;
                }
            } finally {
                setLoading(false);
            }
        }

        async function pollJob(jobId) {
            const maxAttempts = 60; // 60 × 4s = 4 minutos
            let dots = 0;
            for (let i = 0; i < maxAttempts; i++) {
                await new Promise(r => setTimeout(r, 4000));
                dots = (dots % 3) + 1;
                document.getElementById("loading-msg").innerText =
                    "Consultando especialistas" + ".".repeat(dots) + " (" + (i * 4) + "s)";
                try {
                    const res = await fetch(API + `/api/job/${jobId}`, {
                        headers: { "Authorization": `Bearer ${token}` }
                    });
                    const data = await res.json();
                    if (data.status === "done") return data;
                    if (data.status === "error") throw new Error(data.verdict || "Erro na análise");
                    // pending/running → continua
                } catch (err) {
                    if (err.message.includes("Erro") || err.message.includes("reembolsado")) throw err;
                    // erro de rede, tenta novamente
                }
            }
            throw new Error("Tempo esgotado. Tente novamente.");
        }

        function renderFree(data, output) {
            output.innerHTML = `
                <div class="veredito-box glass p-8 rounded-2xl fade-in">
                    <div class="flex items-center gap-3 mb-4">
                        <span class="text-2xl">⚡</span>
                        <h2 class="text-xl font-bold text-amber-300">Veredito do Consultor IA</h2>
                    </div>
                    <div class="whitespace-pre-wrap text-sm leading-relaxed">${escHtml(data.veredito)}</div>
                </div>
                <div class="glass p-6 rounded-2xl fade-in">
                    <h3 class="text-lg font-bold text-amber-300 mb-3">📋 Análise — Educação Financeira</h3>
                    <p class="text-slate-300 text-sm leading-relaxed">${escHtml(data.free_analysis)}</p>
                </div>
                <div class="glass p-6 rounded-2xl text-center fade-in border border-amber-500/20">
                    <p class="text-amber-400 font-bold mb-1">🔓 Desbloqueie o relatório completo</p>
                    <p class="text-slate-400 text-sm mb-4">Veja a análise dos 16 especialistas + PDF profissional</p>
                    <div class="flex gap-3 justify-center flex-wrap">
                        <button onclick="analisar('premium')" class="btn-premium px-6 py-3 rounded-xl font-bold text-white text-sm">
                            ⭐ Usar Crédito Premium
                        </button>
                        <button onclick="comprar()" class="btn-buy px-6 py-3 rounded-xl font-bold text-white text-sm">
                            🛒 Comprar — R$ 19,90
                        </button>
                    </div>
                </div>`;
        }

        function renderPremium(data, output) {
            const analysisId = data.analysis_id;
            const veredito = data.veredito || data.verdict || "";
            const pdfBtn = analysisId
                ? `<button onclick="downloadPDF(${analysisId})"
                        class="bg-green-600 hover:bg-green-500 px-4 py-2 rounded-xl text-sm font-bold transition flex items-center gap-2">
                        📄 Baixar PDF
                   </button>`
                : `<span class="text-xs text-slate-500">PDF indisponível</span>`;

            output.innerHTML = `
                <div class="veredito-box glass p-8 rounded-2xl fade-in">
                    <div class="flex justify-between items-start flex-wrap gap-3">
                        <div class="flex items-center gap-3">
                            <span class="text-2xl">⚡</span>
                            <h2 class="text-xl font-bold text-amber-300">Veredito do Consultor IA</h2>
                        </div>
                        ${pdfBtn}
                    </div>
                    <div class="whitespace-pre-wrap text-sm leading-relaxed mt-4">${escHtml(veredito)}</div>
                    <p class="text-xs text-slate-500 mt-4">Gerado em: ${data.created_at || ""} · Créditos restantes: ${data.credits_remaining ?? "--"}</p>
                </div>`;

            data.agents.forEach((agent, idx) => {
                const card = document.createElement("details");
                if (idx === 0) card.setAttribute("open", "");
                card.className = "glass rounded-2xl border border-white/10 overflow-hidden fade-in";
                card.innerHTML = `
                    <summary class="p-5 font-bold hover:bg-white/5 transition text-amber-300 flex items-center gap-2">
                        <span class="text-xs bg-amber-600/30 px-2 py-1 rounded-lg">${idx + 1}</span>
                        ${escHtml(agent.area)}
                        <span class="text-slate-500 font-normal text-xs ml-1">— ${escHtml(agent.specialty || "")}</span>
                    </summary>
                    <div class="p-5 pt-0 text-slate-300 text-sm leading-relaxed border-t border-white/10 whitespace-pre-wrap">
                        ${escHtml(agent.analysis)}
                    </div>`;
                output.appendChild(card);
            });
        }

        async function downloadPDF(analysisId) {
            if (!token) { alert("Faça login para baixar o PDF."); return; }
            try {
                const res = await fetch(API + `/api/report/pdf/${analysisId}`, {
                    headers: { Authorization: `Bearer ${token}` }
                });
                if (!res.ok) { alert("Erro ao baixar PDF."); return; }
                const blob = await res.blob();
                const url = URL.createObjectURL(blob);
                const a = document.createElement("a");
                a.href = url;
                a.download = `wuzo_relatorio_${analysisId}.pdf`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            } catch { alert("Erro ao baixar PDF."); }
        }

        async function comprar() {
            if (!token) { alert("Faça login primeiro."); showLogin(); return; }
            try {
                const res = await fetch(API + "/api/create-checkout-session", {
                    method: "POST",
                    headers: { Authorization: `Bearer ${token}` }
                });
                const data = await res.json();
                if (res.ok && data.url) {
                    window.location.href = data.url;
                } else {
                    alert(data.error || "Erro ao iniciar pagamento.");
                }
            } catch { alert("Erro de conexão."); }
        }

        // ── UTILS ───────────────────────────────────────────────────────
        function escHtml(str) {
            if (!str) return "";
            return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
                      .replace(/\n/g,"<br>");
        }
        function showErr(el, msg) {
            el.innerText = msg;
            el.classList.remove("hidden");
        }
        function showLogin() {
            closeModals();
            document.getElementById("login-modal").classList.remove("hidden");
            setTimeout(() => document.getElementById("login-email").focus(), 100);
        }
        function showRegister() {
            closeModals();
            document.getElementById("register-modal").classList.remove("hidden");
            setTimeout(() => document.getElementById("reg-email").focus(), 100);
        }
        function closeModals() {
            document.getElementById("login-modal").classList.add("hidden");
            document.getElementById("register-modal").classList.add("hidden");
        }
        document.getElementById("login-modal").addEventListener("click", e => { if (e.target === e.currentTarget) closeModals(); });
        document.getElementById("register-modal").addEventListener("click", e => { if (e.target === e.currentTarget) closeModals(); });
        document.getElementById("login-password").addEventListener("keydown", e => { if (e.key === "Enter") login(); });
        document.getElementById("reg-password").addEventListener("keydown", e => { if (e.key === "Enter") register(); });

        updateUI();
    </script>
</body>
</html>
